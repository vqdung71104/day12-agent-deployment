worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
        '"path":"$request_uri","status":$status,"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,"upstream_addr":"$upstream_addr","upstream_time":"$upstream_response_time"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    upstream agent_upstream {
        server agent:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 2m;

        location / {
            proxy_pass http://agent_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}
